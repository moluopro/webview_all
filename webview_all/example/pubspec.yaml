name: example
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ^3.9.0
  flutter: ">=3.35.0"

dependencies:
  flutter:
    sdk: flutter
  webview_all:
    path: ../
  abutil: ^1.2.2
  cupertino_icons: ^1.0.8

dependency_overrides:
  webview_all_linux:
    path: ../../webview_all_linux
  webview_all_windows:
    path: ../../webview_all_windows
  webview_all_ohos:
    path: ../../webview_all_ohos
  webview_all_web:
    path: ../../webview_all_web

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  webview_flutter_platform_interface: ^2.15.1

flutter:
  uses-material-design: true

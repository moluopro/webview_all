name: webview_all
version: 1.0.0
description: A Flutter plugin that provides a WebView widget with full-platform support.
repository: https://github.com/moluopro/webview_all
homepage: https://github.com/moluopro/webview_all

platforms:
  android:
  ios:
  macos:
  linux:
  windows:
  web:

environment:
  sdk: ^3.9.0
  flutter: ">=3.35.0"

flutter:
  plugin:
    platforms:
      android:
        default_package: webview_flutter_android
      ios:
        default_package: webview_flutter_wkwebview
      macos:
        default_package: webview_flutter_wkwebview
      linux:
        default_package: webview_all_linux
      windows:
        default_package: webview_all_windows
      web:
        default_package: webview_all_web

dependencies:
  flutter:
    sdk: flutter
  webview_flutter_android: ^4.10.15
  webview_flutter_wkwebview: ^3.24.2
  webview_flutter_platform_interface: ^2.15.1
  webview_all_linux: ^0.5.2
  webview_all_windows: ^0.5.2
  webview_all_web: ^0.5.2

dependency_overrides:
  webview_all_linux:
    path: ../webview_all_linux
  webview_all_windows:
    path: ../webview_all_windows
  webview_all_web:
    path: ../webview_all_web

dev_dependencies:
  build_runner: ^2.1.5
  flutter_test:
    sdk: flutter
  mockito: ^5.4.4
  plugin_platform_interface: ^2.1.7

topics:
  - html
  - webview
  - webview-flutter

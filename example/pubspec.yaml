name: webview_all_example
description: Demonstrates how to use the webview_all plugin.
publish_to: none

environment:
  sdk: ^3.9.0
  flutter: ">=3.35.0"

dependencies:
  flutter:
    sdk: flutter
  path_provider: ^2.1.5
  webview_all:
    path: ../webview_all
  webview_flutter_android: ^4.10.15
  webview_flutter_wkwebview: ^3.24.2

dev_dependencies:
  build_runner: ^2.13.1
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  webview_flutter_platform_interface: ^2.15.1

flutter:
  uses-material-design: true
  assets:
    - assets/sample_audio.ogg
    - assets/sample_video.mp4
    - assets/www/index.html
    - assets/www/styles/style.css
